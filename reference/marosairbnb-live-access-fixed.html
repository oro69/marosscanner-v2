<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MarosAirbnb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#081225;
      --bg-2:#0b1730;
      --panel:#102341;
      --panel-soft:rgba(13,29,55,.86);
      --card:rgba(255,255,255,.055);
      --card-2:rgba(255,255,255,.03);
      --line:rgba(255,255,255,.08);
      --line-strong:rgba(255,255,255,.18);
      --text:#f4f7ff;
      --muted:#a9b6d3;
      --blue:#295fd1;
      --blue-soft:rgba(47,111,237,.18);
      --coral:#eb4f68;
      --coral-soft:rgba(232,93,117,.18);
      --mint:#78f1de;
      --mint-soft:rgba(120,241,222,.18);
      --success:#75e2b2;
      --shadow:0 28px 80px rgba(2,8,20,.42);
      --radius-xl:30px;
      --radius-lg:22px;
      --radius-md:16px;
      --radius-sm:12px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%;background:radial-gradient(circle at top,#17335f 0%,#0d2344 20%,#091527 52%,#040913 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    body{min-height:100vh}
    button,input{font:inherit}
    img,svg{display:block;max-width:100%}
    .boot{min-height:100vh;display:grid;place-items:center;padding:28px;background:radial-gradient(circle at 50% 16%,rgba(235,79,104,.18),rgba(235,79,104,0) 24%),radial-gradient(circle at 12% 18%,rgba(41,95,209,.34),rgba(41,95,209,0) 28%),radial-gradient(circle at 86% 14%,rgba(41,95,209,.24),rgba(41,95,209,0) 26%)}
    .glass{background:linear-gradient(180deg,rgba(13,30,54,.96),rgba(8,19,36,.92));backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.07);box-shadow:var(--shadow)}
    .login{width:min(100%,560px);padding:26px 28px 30px;border-radius:38px;text-align:center;position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(7,18,35,.98),rgba(4,11,24,.97))}
    .login:before{content:'';position:absolute;inset:0 0 auto 0;height:180px;background:linear-gradient(180deg,rgba(41,95,209,.16),rgba(41,95,209,0));pointer-events:none}
    .logo-wrap{display:grid;justify-items:center;gap:10px}
    .logo-stage{width:100%;min-height:192px;border-radius:28px;padding:22px 18px 16px;display:grid;justify-items:center;align-content:center;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.018));border:1px solid rgba(255,255,255,.10);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 22px 44px rgba(0,0,0,.34)}
    .logo-mark{width:138px;height:138px;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 35%,rgba(255,255,255,.08),rgba(255,255,255,0) 68%);border:0;box-shadow:none;padding:0;margin:0 auto 10px;border-radius:32px;overflow:hidden}
    .logo-mark{overflow:hidden}.logo-mark img{width:100%;height:100%;object-fit:cover;display:block}.logo-mark svg{width:86px;height:86px}
    .logo-kicker{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:#b6c6e3;font-weight:700}
    .logo-title{font-family:'Plus Jakarta Sans',Inter,sans-serif;font-size:46px;font-weight:800;letter-spacing:-1.1px}
    .logo-subtitle{font-size:14px;line-height:1.55;color:#e0e8f8;max-width:28ch}
    .field{margin-top:18px}
    .field input{width:100%;min-height:58px;border-radius:20px;border:1px solid rgba(255,255,255,.075);background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03));color:var(--text);padding:0 18px;text-align:center;outline:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
    .field input:focus{border-color:rgba(120,241,222,.35);box-shadow:0 0 0 4px rgba(120,241,222,.12)}
    .btn{border:0;cursor:pointer;transition:.18s ease;display:inline-flex;align-items:center;justify-content:center}
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{width:100%;min-height:58px;border-radius:20px;margin-top:14px;background:linear-gradient(135deg,#1e4aa4 0%,#315ec0 42%,#e44d64 100%);color:white;font-weight:800;box-shadow:0 18px 38px rgba(17,37,77,.38)}
    .login-phrase{margin-top:18px;font-size:13px;line-height:1.6;color:#dce6fb}
    .error{display:none;margin-top:12px;padding:12px 14px;border-radius:14px;background:rgba(232,93,117,.12);border:1px solid rgba(232,93,117,.24);color:#ffd8e0;font-size:13px}
    .login-shell{margin-top:18px;display:grid;gap:12px}
    .login-meta{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
    .meta-chip{min-height:30px;padding:0 12px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#eef4ff}

    .app{display:none;padding:12px 12px 96px}
    .app.ready{display:block}
    .mobile{display:block;max-width:760px;margin:0 auto}
    .desktop{display:none;max-width:1320px;margin:0 auto}
    .top{padding:18px 18px 16px;border-radius:34px;background:linear-gradient(180deg,rgba(9,24,46,.99),rgba(6,15,30,.97));position:relative;overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
    .top:before{content:'';position:absolute;inset:0 0 auto 0;height:92px;background:linear-gradient(90deg,rgba(41,95,209,.18),rgba(235,79,104,.08),rgba(41,95,209,0));pointer-events:none}
    .top-head{display:flex;justify-content:space-between;align-items:center;gap:14px;position:relative;z-index:1}
    .brand-head{display:grid;grid-template-columns:48px 1fr;gap:12px;align-items:center}
    .mini-logo{width:48px;height:48px;border-radius:16px;overflow:hidden;display:grid !important;place-items:center;align-self:center;justify-self:start;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.10);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 10px 20px rgba(0,0,0,.22);padding:0;min-width:48px;min-height:48px}
    .mini-logo img{width:100%;height:100%;object-fit:cover;display:block}
    .mini-logo svg{width:26px;height:26px}
    .mini-logo-svg svg{width:100%;height:100%;display:block;transform:scale(1.34);filter:drop-shadow(0 8px 18px rgba(0,0,0,.18))}
    .logo-mark svg{width:248px;height:248px;display:block;overflow:visible;transform:translateY(-6px)}
    .mini-logo svg{overflow:visible}
    h1,h2,h3,h4,p{margin:0}
    .brand-name{font-family:'Plus Jakarta Sans',Inter,sans-serif;font-size:24px;font-weight:800;line-height:1.02;letter-spacing:-.4px}
    .sub{margin-top:6px;font-size:13px;color:var(--muted)}
    .ghost{min-height:46px;padding:0 18px;border-radius:16px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);color:var(--text);font-weight:700}
    .building-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;position:relative;z-index:1}
    .building{min-height:44px;padding:0 18px;border-radius:999px;background:linear-gradient(135deg,rgba(41,95,209,.22),rgba(235,79,104,.16));border:1px solid rgba(255,255,255,.09);color:var(--text);font-weight:700;box-shadow:inset 0 1px 0 rgba(255,255,255,.035)}
    .building.off{opacity:.42}
    .panel{margin-top:16px;padding:16px;border-radius:30px}
    .list{display:grid;gap:12px}
    .item{padding:18px;border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.024));border:1px solid rgba(255,255,255,.07);box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
    .row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .meta{margin-top:10px;color:var(--muted);font-size:13px;line-height:1.5}
    .pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .pill{display:inline-flex;align-items:center;min-height:32px;padding:0 12px;border-radius:999px;border:1px solid transparent;font-size:12px;font-weight:800}
    .booking{background:rgba(47,111,237,.18);border-color:rgba(47,111,237,.30)}
    .airbnb{background:rgba(232,93,117,.16);border-color:rgba(232,93,117,.28)}
    .vrbo{background:rgba(147,118,255,.16);border-color:rgba(147,118,255,.28)}
    .directo{background:rgba(120,241,222,.14);border-color:rgba(120,241,222,.26)}
    .green{background:rgba(117,226,178,.14);border-color:rgba(117,226,178,.24)}
    .amber{background:rgba(255,201,106,.14);border-color:rgba(255,201,106,.24)}
    .rose{background:rgba(232,93,117,.14);border-color:rgba(232,93,117,.24)}
    .blue{background:rgba(47,111,237,.16);border-color:rgba(47,111,237,.24)}

    .assistant-wrap{margin-top:14px;display:grid;gap:10px}
    .assistant-fab{width:100%;padding:14px 16px;border-radius:18px;display:flex;align-items:center;justify-content:flex-start;gap:10px;background:linear-gradient(135deg,rgba(31,79,168,.30),rgba(225,75,98,.20));border:1px solid rgba(255,255,255,.10);color:var(--text);text-align:left}
    .assistant-icon{width:36px;height:36px;border-radius:14px;background:rgba(255,255,255,.10);display:grid;place-items:center;color:#fff;font-weight:900}
    .assistant-panel{padding:14px;border-radius:20px;background:var(--card-2);border:1px solid var(--line);display:grid;gap:10px}
    .assistant-list{display:grid;gap:10px}
    .assistant-suggestion{padding:12px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);display:grid;gap:10px}
    .assistant-top{display:flex;gap:10px;align-items:flex-start}
    .assistant-index{min-width:24px;height:24px;border-radius:999px;background:rgba(120,241,222,.18);display:grid;place-items:center;color:#cffff5;font-size:12px;font-weight:800}
    .assistant-text{flex:1;color:#edf4ff;font-size:14px;line-height:1.5;text-align:left}
    .copy-row{display:flex;justify-content:flex-end}
    .copy-btn{min-height:32px;padding:0 11px;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);color:var(--text);font-size:12px;font-weight:800}
    .copy-btn.done{background:rgba(120,241,222,.18);border-color:rgba(120,241,222,.28);color:#dffff8}

    .calendar-switch{display:flex;gap:10px;overflow:auto;padding-bottom:10px;margin-bottom:12px}
    .calendar-btn{white-space:nowrap;min-height:42px;padding:10px 18px;border-radius:999px;background:linear-gradient(135deg,rgba(47,111,237,.20),rgba(232,93,117,.15));border:1px solid rgba(255,255,255,.10);color:var(--text);font-weight:800}
    .calendar-btn.active{background:linear-gradient(135deg,rgba(47,111,237,.28),rgba(232,93,117,.24))}
    .calendar-layout{display:grid;grid-template-columns:1.05fr .95fr;gap:16px}
    .calendar-card,.detail{padding:16px;border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.022));border:1px solid rgba(255,255,255,.075)}
    .calendar-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
    .month-nav{display:flex;gap:10px}.month{width:42px;height:42px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--text)}
    .calendar-phone{background:#f7f8fc;color:#121826;border-radius:28px;padding:16px 14px}
    .calendar-phone-top{display:flex;justify-content:center;align-items:center;position:relative;margin-bottom:8px}.calendar-phone-top h4{font-size:15px}.calendar-phone-top .month{position:absolute;top:0;background:#edf1f8;border-color:#e3e9f2;color:#1f2937}.calendar-phone-top .prev{left:0}.calendar-phone-top .next{right:0}
    .weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:12px;color:#6b7280;margin:10px 0 8px}.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
    .day{aspect-ratio:1/1;position:relative;border-radius:18px;background:transparent;border:0;color:#111827;display:flex;align-items:flex-start;justify-content:flex-start;padding:8px}.day.empty{opacity:0}.day.today{background:#1f2937;color:#fff;border-radius:999px;width:38px;height:38px;justify-self:center;align-self:center;display:grid;place-items:center;padding:0}.day .n{font-size:14px;font-weight:600}.day .dot{position:absolute;left:50%;transform:translateX(-50%);bottom:8px;width:5px;height:5px;border-radius:999px;background:#60a5fa}.day.reserved{background:#eef2ff;border:1px solid #d9e0f8;cursor:pointer}.reserve-mini{position:absolute;left:50%;transform:translateX(-50%);bottom:7px;min-height:20px;padding:0 7px;border-radius:999px;background:#111827;color:#fff;font-size:9px;font-weight:800;display:inline-flex;align-items:center}.small-months{display:grid;grid-template-columns:repeat(6,minmax(44px,1fr));gap:8px;margin-top:14px}.sm{min-height:38px;border-radius:14px;background:#eef1f7;border:0;color:#111827;font-weight:700}.sm.active{background:#4b5563;color:#fff}
    .empty-state{display:grid;align-content:center;gap:10px;min-height:240px}

    .bottom{position:fixed;left:12px;right:12px;bottom:12px;z-index:30;padding:10px;border-radius:24px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .nav{min-height:54px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--text);font-size:12px}
    .nav.active{background:linear-gradient(135deg,rgba(31,79,168,.38),rgba(225,75,98,.24));border-color:rgba(255,255,255,.12);box-shadow:0 10px 22px rgba(5,13,30,.28)}

    .desktop-grid{display:grid;grid-template-columns:290px 1fr;gap:18px}
    .side,.main{padding:18px;border-radius:30px;background:linear-gradient(180deg,rgba(16,38,67,.95),rgba(10,24,43,.90))}.side{position:sticky;top:14px;height:fit-content}.nav-list{display:grid;gap:10px;margin-top:16px}
    .nav-desktop{min-height:48px;padding:0 16px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);text-align:left;font-weight:800}
    .nav-desktop.active{background:linear-gradient(135deg,rgba(31,79,168,.38),rgba(225,75,98,.24));border-color:rgba(255,255,255,.12);box-shadow:0 10px 22px rgba(5,13,30,.28)}

    @media (min-width:980px){.mobile{display:none}.desktop{display:block}.app{padding:14px}.bottom{display:none}}
    @media (max-width:979px){.calendar-layout{grid-template-columns:1fr}}
  
    .logo-stage{
      width:100%;
      padding:26px 20px 22px;
      border-radius:28px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:14px;
      text-align:center;
      background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.018));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 22px 44px rgba(0,0,0,.34);
    }
    .logo-mark{
      width:190px !important;
      height:190px !important;
      border-radius:34px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:radial-gradient(circle at 50% 35%,rgba(255,255,255,.09),rgba(255,255,255,0) 68%);
      border:1px solid rgba(255,255,255,.10);
      margin:0 auto;
    }
    .logo-kicker{ display:none !important; }
    .logo-subtitle{ display:none !important; }
    .login-meta{ display:none !important; }
    .login-shell{ margin-top:22px; display:grid; gap:12px; }

    
    .brand-head{
      display:flex;
      flex-direction:row;
      align-items:center;
      gap:10px;
    }
    .mini-logo.mini-logo-svg{
      width:38px !important;
      height:38px !important;
      min-width:38px;
      min-height:38px;
      border-radius:12px;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,rgba(47,111,237,.22),rgba(232,93,117,.18));
      border:1px solid rgba(255,255,255,.12);
      flex-shrink:0;
    }
    .mini-logo.mini-logo-svg svg{
      width:34px !important;
      height:34px !important;
      min-width:34px;
      min-height:34px;
    }
    .brand-name{
      font-family:'Plus Jakarta Sans',Inter,sans-serif;
      font-size:22px;
      font-weight:800;
      letter-spacing:-0.2px;
      margin:0;
    }

    </style>
</head>
<body>
  <div id="root"></div>
  <script>
  (function(){

    
    const APTS={
      ovis:['201s','202s','301s','302s','401s','402s','501s','502s','601s'],
      maros:['201pp','202pp','301pp','302pp','401pp','402pp'],
      easton:['2A','2B','3A','3B']
    };
    function aptOptions(building){return (APTS[building]||[]).map(a=>`<option value="${a}">${a}</option>`).join('');}
    const PAY_OPTS={
      ovis:['Efectivo','Nequi','Bancolombia','Daviplata'],
      maros:['Efectivo','Nequi','Bancolombia','Daviplata'],
      easton:['Zelle','Venmo','Cash','CashApp']
    };
    function payOptions(building){return (PAY_OPTS[building]||PAY_OPTS.ovis).map(p=>`<option value="${p}">${p}</option>`).join('');}
    function buildingOptions(){return STATE.user.buildings.map(b=>`<option value="${b}">${B[b]}</option>`).join('');}

    // Delegated handlers for dynamic form buttons (survive renderApp re-renders)
    document.addEventListener('change', function(e){
      if(e.target && (e.target.id==='pf-building'||e.target.id==='ng-building')){
        const prefix = e.target.id==='pf-building'?'pf':'ng';
        const aptSel=document.getElementById(prefix+'-apt');
        if(aptSel){aptSel.innerHTML=aptOptions(e.target.value);}
        // Update currency label based on building
        const isUSD = e.target.value==='easton';
        const lbl=document.getElementById(prefix+'-currency-label');
        const sym=document.getElementById(prefix+'-currency-symbol');
        const inp=document.getElementById(prefix+'-amount');
        if(lbl) lbl.textContent='$';
        if(sym) sym.textContent='$';
        if(inp) inp.placeholder=isUSD?'0.00':'0';
        const paySel=document.getElementById(prefix+'-paytype');
        if(paySel) paySel.innerHTML=payOptions(e.target.value);
      }
      // When checkin changes → set checkout min to checkin date
      if(e.target && (e.target.id==='pf-checkin'||e.target.id==='ng-checkin')){
        const pfx=e.target.id.startsWith('pf')?'pf':'ng';
        const co=document.getElementById(pfx+'-checkout');
        if(co&&e.target.value){co.min=e.target.value; if(co.value&&co.value<e.target.value) co.value='';}
      }
    });
    document.addEventListener('click', function(e){
      // ── Por Fuera add button ──
      if(e.target && e.target.id==='pfAddBtn'){
        const form=document.getElementById('pfGuestForm');
        if(form){
          const opening=form.style.display!=='block';
          form.style.display=opening?'block':'none';
          if(opening){
            const today=new Date().toISOString().slice(0,10);
            ['pf-checkin','pf-checkout'].forEach(id=>{const el=document.getElementById(id);if(el){el.min=today;el.value='';}});
            const bSel=document.getElementById('pf-building');
            if(bSel) bSel.innerHTML=buildingOptions();
            const aSel=document.getElementById('pf-apt');
            if(bSel&&aSel) aSel.innerHTML=aptOptions(bSel.value);
            const paySel2=document.getElementById('pf-paytype');
            if(paySel2&&bSel) paySel2.innerHTML=payOptions(bSel.value);
            const lbl=document.getElementById('pf-currency-label');
            if(lbl) lbl.textContent='$';
            const paySel=document.getElementById('pf-paytype');
            if(paySel&&bSel) paySel.innerHTML=payOptions(bSel.value);
          }
        }
      }
      if(e.target && e.target.id==='pf-cancel'){
        const form=document.getElementById('pfGuestForm');
        if(form) form.style.display='none';
      }
      if(e.target && e.target.id==='pf-save'){
        const name=(document.getElementById('pf-name').value||'').trim();
        const building=document.getElementById('pf-building').value;
        const apt=(document.getElementById('pf-apt').value||'').trim();
        const checkin=document.getElementById('pf-checkin').value;
        const checkout=document.getElementById('pf-checkout').value;
        const payment=document.getElementById('pf-paystatus').value;
        const paytype=document.getElementById('pf-paytype').value;
        const amount=parseFloat(document.getElementById('pf-amount').value)||0;
        if(!name||!checkin||!checkout){alert('Nombre, check-in y check-out son obligatorios.');return;}
        const currency=building==='easton'?'USD':'COP'; DATA.outside.push({guest:name,building,apt,checkin,checkout,payment,paytype,amount,currency,source:'Por Fuera'});
        renderApp();
      }
      // ── Próximos add button ──
      if(e.target && e.target.id==='addGuestBtn'){
        const form=document.getElementById('addGuestForm');
        if(form){
          const isOpen=form.style.display==='grid'||form.style.display==='block';
          form.style.display=isOpen?'none':'block';
          if(!isOpen){
            const today=new Date().toISOString().slice(0,10);
            ['ng-checkin','ng-checkout'].forEach(id=>{const el=document.getElementById(id);if(el){el.min=today;el.value='';}});
            const bSel=document.getElementById('ng-building');
            if(bSel) bSel.innerHTML=buildingOptions();
            const aSel=document.getElementById('ng-apt');
            if(bSel&&aSel) aSel.innerHTML=aptOptions(bSel.value);
            const paySel2=document.getElementById('ng-paytype');
            if(paySel2&&bSel) paySel2.innerHTML=payOptions(bSel.value);

    function normalizeBuilding(rec){

    function titleForRecord(rec, building){

      if(rec.status==='cancelled') return lang==='en' ? `Cancelled booking · ${platform}` : `Reserva cancelada · ${platform}`;
      if(rec.status==='modified' || rec.category==='modification') return lang==='en' ? `Booking modified · ${platform}` : `Reserva modificada · ${platform}`;
      if(rec.status==='pending') return lang==='en' ? `Pending request · ${platform}` : `Solicitud pendiente · ${platform}`;
      return lang==='en' ? `Reservation update · ${platform}` : `Actualización de reserva · ${platform}`;
    }
    function questionForRecord(rec, building){
      const lang=buildingLang(building);
      const parts=[];
      if(rec.guestName) parts.push((lang==='en'?'Guest: ':'Huésped: ')+rec.guestName);
      if(rec.apartment) parts.push((lang==='en'?'Apt: ':'Apto: ')+rec.apartment);
      if(rec.checkIn||rec.checkOut) parts.push((lang==='en'?'Stay: ':'Estadía: ')+(rec.checkIn||'?')+' → '+(rec.checkOut||'?'));
      if(rec.paymentAmount) parts.push((lang==='en'?'Payment: ':'Pago: ')+rec.paymentAmount);
      else if(rec.totalAmount) parts.push((lang==='en'?'Total: ':'Total: ')+rec.totalAmount);
      if(rec.notes) parts.push(rec.notes);

    function parseMoneyLoose(v){
      if(!v) return 0;

      if(!s) return 0;
      if(s.includes(',') && s.includes('.')) return Number(s.replace(/,/g,''))||0;
      if((s.match(/,/g)||[]).length===1 && !s.includes('.')){
        const [a,b]=s.split(',');
        if((b||'').length===2) return Number((a+'.'+b).replace(/[^\d.-]/g,''))||0;
      }
      return Number(s.replace(/,/g,''))||0;

        STATE.feedsLoaded=true;

    function hydrateData(rows){
      const userBuildings=(STATE.user?.buildings||['ovis','maros','easton']).map(b=>b.toLowerCase());
      function normalizeApt(building,rawApt){
        const b=building.toLowerCase();
        const raw=(rawApt||'').toLowerCase().replace(/[^a-z0-9]/g,'');
        const valid=APT_MAP[b]||[];
        for(const apt of valid){
          if(apt.replace(/[^a-z0-9]/g,'')===raw) return apt.toUpperCase();
        }
        return null;
      }
      function userCanSee(building){
        return userBuildings.includes(building.toLowerCase());
      }
      const now=new Date();
      const week=startOfWeek(now), month=startOfMonth(now), year=startOfYear(now);
      const messages=[]; const calendar=[]; const guests=[]; const outside=[]; const upcoming=[]; const financeMap={};
      rows.forEach((rec,idx)=>{
        const building=normalizeBuilding(rec);
        if(!userCanSee(building)) return;
        const source=normalizeSource(rec);
        const aptNorm=normalizeApt(building,rec.apartment);
        if(!aptNorm) return;
        const apt=aptNorm.toLowerCase();

        const totalNum=parseMoneyLoose(rec.paymentAmount||rec.totalAmount);
        const msgDate=new Date(rec.messageDate||Date.now());

          id:'m'+idx,
          title:titleForRecord(rec,building),

          source,
          date:niceDateLabel(rec.messageDate,building),
          tag:rec.category||rec.status||'update',
          guest:rec.guestName||'—',
          question:questionForRecord(rec,building)
        });
        if(start && end){
          calendar.push({id:'r'+idx,building,apt:aptNorm,guest:rec.guestName||'—',phone:'',start,end,source});
          const today=new Date(); today.setHours(0,0,0,0);
          const sd=pd(start), ed=pd(end);
          if(sd<=today && ed>=today){
            guests.push({name:rec.guestName||'—',building,apt:aptNorm,dates:dateShort(start,end,buildingLang(building)),source});
          }
          if(sd>=today){
            upcoming.push({title:`${B[building]} ${aptNorm} · ${rec.guestName||'Guest'}`,building,time:sd.toLocaleDateString(buildingLang(building)==='en'?'en-US':'es-CO',{month:'short',day:'numeric'})});
          }
        }
        if(source.toLowerCase().includes('direct') || (rec.notes && rec.notes.toLowerCase().includes('direct'))){
          outside.push({guest:rec.guestName||'—',building,apt:aptNorm,checkin:start||'',checkout:end||'',payment:paymentLabel(rec,building),paytype:source});
        }
        const k=`${building}|${aptNorm}`;
        if(!financeMap[k]) financeMap[k]={building,apt:aptNorm,week:0,month:0,year:0};
        if(totalNum>0){
          if(within(msgDate,week)) financeMap[k].week+=totalNum;
          if(within(msgDate,month)) financeMap[k].month+=totalNum;
          if(within(msgDate,year)) financeMap[k].year+=totalNum;
        }
      });
      DATA.messages=messages;

    };

    function bind(){
      const logout=()=>{STATE.user=null;STATE.tab='general';STATE.ai=null;STATE.selected=null;STATE.calendarView='list';renderLogin()};
      q('#logoutM')&&(q('#logoutM').onclick=logout);
      q('#logoutD')&&(q('#logoutD').onclick=logout);
      qa('[data-b]').forEach(b=>b.onclick=()=>{const k=b.dataset.b; if(STATE.activeBuildings.includes(k)) STATE.activeBuildings=STATE.activeBuildings.filter(x=>x!==k); else STATE.activeBuildings.push(k); if(!STATE.activeBuildings.length) STATE.activeBuildings=[...STATE.user.buildings]; renderApp();});
      qa('[data-tab]').forEach(b=>b.onclick=()=>{STATE.tab=b.dataset.tab; STATE.ai=null; renderApp();});
      qa('[data-ai]').forEach(b=>b.onclick=()=>{STATE.ai=STATE.ai===b.dataset.ai?null:b.dataset.ai; renderApp();});
      qa('[data-cal]').forEach(b=>b.onclick=()=>{STATE.calendarView=b.dataset.cal; STATE.selected=null; renderApp();});
      qa('[data-m]').forEach(b=>b.onclick=()=>{STATE.month=new Date(STATE.month.getFullYear(),STATE.month.getMonth()+Number(b.dataset.m),1); STATE.selected=null; renderApp();});
      qa('[data-sm]').forEach(b=>b.onclick=()=>{STATE.month=new Date(STATE.month.getFullYear(),Number(b.dataset.sm),1); STATE.selected=null; renderApp();});
      qa('[data-r]').forEach(b=>b.onclick=()=>{STATE.selected=b.dataset.r; renderApp();});
      qa('[data-copy]').forEach(b=>b.onclick=async()=>{const text=decodeURIComponent(b.dataset.copy); try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(text)}else{const t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove()} const original=b.textContent; b.textContent=(b.textContent==='Copy'||b.textContent==='Copied')?'Copied':'Copiado'; b.classList.add('done'); setTimeout(()=>{b.textContent=original; b.classList.remove('done')},1400)}catch(e){b.textContent='Error'; setTimeout(()=>b.textContent=(buildingLang('easton')==='en'?'Copy':'Copiar'),1200)}});
